services:

  # ── Base de datos MySQL ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: franchise-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin}
      MYSQL_DATABASE: ${DB_NAME:-franchise_db}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci

    ports:
      - "${DB_PORT_HOST:-3306}:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    # Configuración de MySQL para mejor rendimiento y compatibilidad
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=128M
      --max-connections=100

    # Healthcheck: espera a que MySQL esté listo antes de arrancar la API.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${DB_PASSWORD:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - franchise-network

  # ── Redis (cache / sesiones) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: franchise-redis
    restart: unless-stopped

    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - franchise-network

  # ── Aplicación Spring Boot ───────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: franchise-api:latest
    container_name: franchise-api
    restart: unless-stopped

    # La API solo arranca cuando MySQL Y Redis están healthy
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      # Perfil Docker: sobreescribe URLs de conexión para apuntar a los contenedores
      SPRING_PROFILES_ACTIVE: docker

      # Conexión MySQL — 'mysql' se resuelve por DNS interno de Docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-franchise_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-admin}

      # Conexión Redis — 'redis' se resuelve por DNS interno de Docker
      REDIS_HOST: redis
      REDIS_PORT: 6379

      SERVER_PORT: 8080
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"

    ports:
      - "${API_PORT:-8080}:8080"

    networks:
      - franchise-network

    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

# ── Volúmenes ─────────────────────────────────────────────────
# Persistencia de datos entre reinicios de contenedores.
volumes:
  mysql_data:
    driver: local
    labels:
      description: "MySQL data — simula Amazon RDS EBS storage"

  redis_data:
    driver: local
    labels:
      description: "Redis data — simula Amazon ElastiCache backup"

# ── Redes ──────────────────────────────────────────────────────
networks:
  franchise-network:
    driver: bridge
    labels:
      description: "Red interna — simula AWS VPC private subnet"