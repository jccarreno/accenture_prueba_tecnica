# ============================================================
#  Franchise API — Configuración principal
# ============================================================

spring:
  application:
    name: franchise-api

  profiles:
    active: local

  # ── R2DBC (reactive DB) ──────────────────────────────────
  r2dbc:
    url: r2dbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:franchise_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:admin}
    pool:
      initial-size: 2
      max-size: 10
      max-idle-time: 30m

  # ── DataSource JDBC (exclusivo para Flyway — no se usa en runtime reactivo) ──
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:franchise_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:admin }
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── Flyway ───────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Mensajes de error (Spring Boot 4) ────────────────────
  web:
    error:
      include-message: always
      include-binding-errors: always

# ── Servidor ─────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# ── Logging ──────────────────────────────────────────────
logging:
  level:
    root: INFO
    "[com.accenture.franchise]": DEBUG
    "[io.r2dbc]": DEBUG
    "[org.springframework.r2dbc]": DEBUG